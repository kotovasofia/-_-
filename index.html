<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная История</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Фон и музыка */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('background.jpg') no-repeat center center/cover;
            z-index: -1;
            filter: brightness(0.6); /* Затемнение фона для читаемости текста */
        }

        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 20px;
            font-weight: bold;
            transition: background 0.3s;
        }

        #music-control:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Основной контейнер */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 40px;
        }

        /* Сетки для изображений */
        .gallery-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px #000;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            display: inline-block;
            padding-bottom: 5px;
        }

        .image-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .clickable-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border: 3px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .clickable-img:hover {
            transform: scale(1.05);
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .clickable-img.playing {
            border-color: #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }

        /* Блок диалога */
        #dialogue-container {
            margin-top: 40px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            display: inline-block;
        }

        #dialogue-img {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        #dialogue-img:hover {
            border-color: #ffd700;
            transform: scale(1.02);
        }

        /* Текстовая область снизу */
        #text-area {
            margin-top: 50px;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            line-height: 1.6;
            text-align: left;
            border-left: 5px solid #ffd700;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .clickable-img {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <!-- Фоновое изображение -->
    <div id="bg-container"></div>

    <!-- Кнопка музыки -->
    <button id="music-control">⏸ Пауза</button>
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио элемент.
    </audio>

    <div class="container">
        <h1>Добро пожаловать в историю</h1>

        <!-- Локации -->
        <div class="gallery-section">
            <div class="section-title">Локации</div>
            <div class="image-grid">
                <img src="Артефакт.jpeg" alt="Локация 1" class="clickable-img" data-audio="audio_loc1.mp3" data-text="Вы вошли в древнюю библиотеку. Запах старых книг наполняет воздух...">
                <img src="Текстура.jpeg" alt="Локация 2" class="clickable-img" data-audio="audio_loc2.mp3" data-text="Темное болото окутано туманом. Где-то вдали слышен странный звук...">
                <img src="Архитектура.png" alt="Локация 3" class="clickable-img" data-audio="audio_loc3.mp3" data-text="Жар от лавы невыносим. Вы находитесь в самом сердце вулкана...">
                <img src="Динамика.jpeg" alt="Локация 4" class="clickable-img" data-audio="audio_loc4.mp3" data-text="Воздух здесь чист и прозрачен. Парящие острова открывают вид на весь мир...">
            </div>
        </div>

        <!-- Персонажи -->
        <div class="gallery-section">
            <div class="section-title">Персонажи</div>
            <div class="image-grid">
                <img src="Элиас_1.jpeg" alt="Персонаж 1" class="clickable-img" data-audio="audio_char1.mp3" data-text="Мудрый маг приветствует вас: 'Я ждал твоего прихода, путник.'">
                <img src="Кайра_2.jpeg" alt="Персонаж 2" class="clickable-img" data-audio="audio_char2.mp3" data-text="Воительница проверяет свой меч: 'Враг близко, будь начеку.'">
                <img src="Безымянный_3.jpeg" alt="Персонаж 3" class="clickable-img" data-audio="audio_char3.mp3" data-text="Из тени доносится шепот: 'Тише... нас могут услышать.'">
                <img src="Лира_4.jpeg" alt="Персонаж 4" class="clickable-img" data-audio="audio_char4.mp3" data-text="Эльфийка улыбается: 'Лес хранит много тайн, я покажу тебе путь.'">
                <img src="Вейл_5.jpeg" alt="Персонаж 5" class="clickable-img" data-audio="audio_char5.mp3" data-text="Кузнец стучит молотом: 'Нужна новая броня? Я сделаю лучшую!'">
            </div>
        </div>

        <!-- Диалог -->
        <div class="gallery-section">
            <div class="section-title">Сцена Диалога</div>
            <div id="dialogue-container">
                <img src="dialogue.jpg" alt="Диалог" id="dialogue-img" data-audio="audio_dialogue.mp3" data-text="Между героями завязывается важный разговор о судьбе мира...">
            </div>
        </div>

        <!-- Область текста -->
        <div id="text-area">
            Нажмите на любое изображение, чтобы воспроизвести аудио и увидеть описание сцены.
        </div>
    </div>

    <script>
        // Управление фоновой музыкой
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-control');
        let isPlaying = true;

        // Попытка автовоспроизведения (может быть заблокирована браузером до первого клика)
        window.addEventListener('load', () => {
            bgMusic.play().catch(e => {
                console.log("Автовоспроизведение заблокировано браузером. Требуется клик.");
                isPlaying = false;
                musicBtn.textContent = "▶ Play";
            });
        });

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.textContent = "▶ Play";
            } else {
                bgMusic.play();
                musicBtn.textContent = "⏸ Пауза";
            }
            isPlaying = !isPlaying;
        });

        // Обработка кликов по изображениям
        const images = document.querySelectorAll('.clickable-img, #dialogue-img');
        const textArea = document.getElementById('text-area');
        let currentAudio = null;

        images.forEach(img => {
            img.addEventListener('click', function() {
                const audioSrc = this.getAttribute('data-audio');
                const description = this.getAttribute('data-text');

                // Обновление текста
                textArea.innerText = description;

                // Сброс подсветки предыдущего активного элемента
                images.forEach(i => i.classList.remove('playing'));
                
                // Подсветка текущего
                this.classList.add('playing');

                // Остановка предыдущего аудио
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                }

                // Воспроизведение нового аудио
                if (audioSrc) {
                    currentAudio = new Audio(audioSrc);
                    currentAudio.play().catch(e => alert("Аудиофайл не найден: " + audioSrc));
                    
                    // Убираем подсветку когда аудио закончится
                    currentAudio.onended = () => {
                        this.classList.remove('playing');
                    };
                }
            });
        });
    </script>
</body>
</html>
